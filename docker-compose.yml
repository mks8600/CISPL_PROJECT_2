# CISPL Multi-Tenant SaaS Platform — Docker Compose
# Usage:
#   cp backend/.env.example backend/.env  (then edit the values)
#   docker compose up -d


services:
  # ─── PostgreSQL Database ───
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: cispl_db
      POSTGRES_USER: cispl_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    ports:
      - "127.0.0.1:5432:5432"   # Only accessible from localhost
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cispl_user -d cispl_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Node.js Backend API ───
  api:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: postgresql://cispl_user:${DB_PASSWORD:-changeme}@db:5432/cispl_db
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-string}
      JWT_EXPIRES_IN: 24h
      PORT: 3000
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  # ─── Nginx (Frontend + Reverse Proxy) ───
  frontend:
    image: nginx:alpine
    restart: always
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    ports:
      - "80:80"
    networks:
      - app_network

volumes:
  pgdata:

networks:
  app_network:
    driver: bridge
