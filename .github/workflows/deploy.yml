name: Deploy CISPL to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: ./
        run: npm ci

      - name: Build frontend
        working-directory: ./
        run: npm run build

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "dist/,backend/,nginx/,docker-compose.yml"
          target: "/home/deploy/cispl-project"
          overwrite: true

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /home/deploy/cispl-project

            # Create backend .env if it doesn't exist
            if [ ! -f backend/.env ]; then
              cp backend/.env.example backend/.env
              echo "⚠️  Created backend/.env from .env.example — please update secrets!"
            fi

            # Rebuild and restart all containers
            docker compose down
            docker compose build api
            docker compose up -d

            # Wait for DB to be healthy, then seed it (safe to re-run, uses ON CONFLICT)
            echo "⏳ Waiting for database to be ready..."
            sleep 10
            docker compose exec -T api node db/generate-seed.js || echo "⚠️  Seed may have already been applied"

            echo "✅ CISPL deployed successfully at $(date)"
