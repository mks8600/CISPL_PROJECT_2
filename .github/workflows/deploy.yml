name: Deploy CISPL to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: ./
        run: npm ci

      - name: Build frontend
        working-directory: ./
        run: npm run build

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/deploy/cispl-project
            git pull origin main
            
            # Copy built frontend to the dist mount directory
            cp -r dist/* frontend-dist/
            
            # Rebuild and restart containers
            docker compose build api
            docker compose up -d
            
            echo "✅ CISPL deployed successfully at $(date)"
