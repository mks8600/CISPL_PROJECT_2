name: Deploy CISPL to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: ./
        run: npm ci

      - name: Build frontend
        working-directory: ./
        run: npm run build

      - name: Copy dist to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "dist/"
          target: "/home/deploy/cispl-project"
          overwrite: true
          rm: true

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /home/deploy/cispl-project
            git pull origin main

            # Create backend .env if it doesn't exist
            if [ ! -f backend/.env ]; then
              cp backend/.env.example backend/.env
              echo "⚠️  Created backend/.env from .env.example — please update secrets!"
            fi

            # Rebuild and restart all containers
            docker compose down
            docker compose build api
            docker compose up -d

            echo "✅ CISPL deployed successfully at $(date)"

